spring.application.name=conti-talent_web

# ===== Servidor =====
server.port=8080
server.servlet.session.timeout=2h

# ===== Thymeleaf (recarga en dev) =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===== Recursos estáticos =====
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ===== Codificación / Jackson =====
# Nota (Boot 4 + Jackson 3): SerializationFeature.WRITE_DATES_AS_TIMESTAMPS fue
# removida. Como nuestros DTOs usan `long` (epoch ms) directamente para fechas,
# no necesitamos forzar esa serialización — Jackson serializa long como número.
spring.jackson.default-property-inclusion=non_null
spring.mvc.format.date-time=iso

# ===== Logs =====
logging.level.com.conti_talent=INFO

# ===== DevTools (solo dev) =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===== Persistencia temporal H2/JPA =====
spring.datasource.url=jdbc:h2:mem:conti_talent;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Archivos de postulantes =====
conti.uploads.postulantes-dir=uploads/postulantes
conti.uploads.max-file-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

