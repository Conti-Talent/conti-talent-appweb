spring.application.name=conti-talent_web

# ===== Servidor =====
server.port=8080
server.servlet.session.timeout=2h

# ===== Thymeleaf (recarga en dev) =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===== Recursos estaticos =====
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ===== Errores MVC =====
spring.web.error.path=/error

# ===== Uploads =====
app.cv.upload-dir=uploads/cv
app.cv.max-file-size=5242880
app.cv.allowed-content-types=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/jpeg,image/png,image/webp
conti.uploads.postulantes-dir=uploads
conti.uploads.max-file-size-bytes=5242880
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ===== Codificacion / Jackson =====
# Los DTOs usan LocalDateTime y se serializan en formato ISO legible.
spring.jackson.default-property-inclusion=non_null
spring.mvc.format.date-time=iso

# ===== Logs =====
logging.level.com.conti_talent=INFO

# ===== DevTools (solo dev) =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===== Persistencia MySQL/JPA =====
spring.datasource.url=jdbc:mysql://localhost:3309/conti_talent?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
