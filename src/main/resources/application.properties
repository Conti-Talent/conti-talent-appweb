spring.application.name=conti-talent_web

# ===== Servidor =====
server.port=8080
server.servlet.session.timeout=2h

# ===== Thymeleaf (recarga en dev) =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===== Recursos estáticos =====
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ===== Codificación / Jackson =====
# Nota (Boot 4 + Jackson 3): SerializationFeature.WRITE_DATES_AS_TIMESTAMPS fue
# removida. Como nuestros DTOs usan `long` (epoch ms) directamente para fechas,
# no necesitamos forzar esa serialización — Jackson serializa long como número.
spring.jackson.default-property-inclusion=non_null
spring.mvc.format.date-time=iso

# ===== Base de datos MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3309/conti_talent?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ===== Logs =====
logging.level.com.conti_talent=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===== DevTools (solo dev) =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

