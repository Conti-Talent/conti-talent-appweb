<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación técnica · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <link rel="stylesheet" th:href="@{/css/pages.css}" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" th:href="@{/}">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a th:href="@{/mi-estado}">Mi estado</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container page-shell">
    <section class="quiz">
      <header class="anim-fade-up mb-4">
        <span class="badge" id="quiz-area">—</span>
        <h1 id="quiz-title" class="mt-2">—</h1>
        <p class="muted">Responde todas las preguntas. Tu puntaje se calculará automáticamente.</p>
      </header>

      <div class="quiz__progress">
        <span id="quiz-progress-text">0 / 0 respondidas</span>
        <span class="soft">Calificación automática</span>
      </div>
      <div class="progress quiz-progress-wrap">
        <div class="progress__bar" id="quiz-progress-bar"></div>
      </div>

      <form id="quiz-form" novalidate>
        <div id="quiz-questions"></div>
        <div class="form-actions mt-5">
          <a th:href="@{/mi-estado}" class="btn btn--ghost">Guardar y salir</a>
          <button type="submit" class="btn btn--primary btn--lg">Enviar respuestas</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Universidad Continental · Conti Talent</span>
    </div>
  </footer>

  <script th:src="@{/js/storage.js}"></script>
  <script th:src="@{/js/seed.js}"></script>
  <script th:src="@{/js/ui.js}"></script>
  <script th:src="@{/js/validators.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
  <script th:src="@{/js/areas.js}"></script>
  <script th:src="@{/js/ofertas.js}"></script>
  <script th:src="@{/js/postulantes.js}"></script>
  <script th:src="@{/js/evaluacion.js}"></script>
  <script th:src="@{/js/main.js}"></script>
  <script th:src="@{/js/page-evaluacion.js}"></script>
</body>
</html>
