<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postular · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/base.css}" href="/css/base.css" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" href="/css/layout.css" />
  <link rel="stylesheet" th:href="@{/css/components.css}" href="/css/components.css" />
  <link rel="stylesheet" th:href="@{/css/pages.css}" href="/css/pages.css" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" href="/css/animations.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" th:href="@{/}" href="/">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a th:href="@{/ofertas}" href="/ofertas">Ofertas</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container page-shell--narrow">
    <header class="anim-fade-up mb-5">
      <span class="badge" id="postular-area">—</span>
      <h1 id="postular-title" class="mt-2">—</h1>
      <p class="muted">Completa tus datos para enviar tu postulación. Después podrás resolver la evaluación técnica.</p>
    </header>

    <div class="stepper mb-5">
      <div class="step is-current"><span class="step__num">1</span><span>Datos personales</span></div>
      <div class="step"><span class="step__num">2</span><span>Evaluación</span></div>
      <div class="step"><span class="step__num">3</span><span>Estado</span></div>
    </div>

    <form id="postular-form" class="form-grid card anim-fade-up" novalidate>
      <h3 class="mb-2">Datos personales</h3>
      <div class="form-grid form-grid--2">
        <div class="field">
          <label for="nombre">Nombre completo</label>
          <input class="input" id="nombre" name="nombre" />
          <span class="error"></span>
        </div>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input class="input" type="email" id="email" name="email" />
          <span class="error"></span>
        </div>
      </div>
      <div class="field">
        <label for="telefono">Teléfono</label>
        <input class="input" id="telefono" name="telefono" placeholder="+51 999 999 999" />
        <span class="error"></span>
      </div>

      <h3 class="mt-4">Experiencia y habilidades</h3>
      <div class="field">
        <label for="experiencia">Experiencia profesional o académica</label>
        <textarea class="textarea" id="experiencia" name="experiencia" placeholder="Cuéntanos sobre tu experiencia, proyectos y logros..."></textarea>
        <span class="error"></span>
      </div>
      <div class="field">
        <label for="habilidades">Habilidades clave</label>
        <textarea class="textarea" id="habilidades" name="habilidades" placeholder="Java, SQL, didáctica, redacción..."></textarea>
        <span class="error"></span>
      </div>

      <h3 class="mt-4">Curriculum Vitae</h3>
      <label class="file-drop" id="cv-drop">
        <input type="file" id="cv-input" accept=".pdf,.doc,.docx" />
        <div class="file-drop__icon">📎</div>
        <div class="font-medium" id="cv-label">Sube tu CV (PDF o DOCX)</div>
        <div class="soft text-sm">Haz clic o arrastra el archivo aquí</div>
      </label>

      <div class="form-actions">
        <a th:href="@{/ofertas}" href="/ofertas" class="btn btn--ghost">Cancelar</a>
        <button type="submit" class="btn btn--primary btn--lg">Enviar postulación</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Universidad Continental · Conti Talent</span>
    </div>
  </footer>

  <script th:src="@{/js/storage-api.js?v=rest3}" src="/js/storage-api.js?v=rest3"></script>
  <script th:src="@{/js/ui.js?v=rest3}" src="/js/ui.js?v=rest3"></script>
  <script th:src="@{/js/validators.js?v=rest3}" src="/js/validators.js?v=rest3"></script>
  <script th:src="@{/js/auth.js?v=rest3}" src="/js/auth.js?v=rest3"></script>
  <script th:src="@{/js/areas.js?v=rest3}" src="/js/areas.js?v=rest3"></script>
  <script th:src="@{/js/ofertas.js?v=rest3}" src="/js/ofertas.js?v=rest3"></script>
  <script th:src="@{/js/postulantes.js?v=rest3}" src="/js/postulantes.js?v=rest3"></script>
  <script th:src="@{/js/main.js?v=rest3}" src="/js/main.js?v=rest3"></script>
  <script th:src="@{/js/page-postular.js?v=rest3}" src="/js/page-postular.js?v=rest3"></script>
</body>
</html>
