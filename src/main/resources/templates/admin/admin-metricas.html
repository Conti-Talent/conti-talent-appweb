<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Metricas - Admin</title><link rel="stylesheet" th:href="@{/css/base.css}"/></head>
<body>
  <header class="site-header"><div class="container">
    <a th:href="@{/admin}" class="brand">ContiTalent Admin</a>
    <nav class="primary-nav"><a th:href="@{/logout}">Cerrar sesion</a></nav>
  </div></header>
  <main class="container">
    <div class="admin-layout">
      <nav class="admin-sidebar">
        <strong>Menu</strong>
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/areas}">Areas</a>
        <a th:href="@{/admin/ofertas}">Ofertas</a>
        <a th:href="@{/admin/usuarios}">Usuarios</a>
        <a th:href="@{/admin/metricas}">Metricas</a>
        <hr style="margin:12px 0;"/>
        <a th:href="@{/}">Sitio publico</a>
      </nav>
      <div class="admin-main">
        <h1>Metricas</h1>
        <div class="grid grid--3" style="margin-top:20px;">
          <div class="card"><h3>Total Areas</h3><p th:text="${totalAreas}"></p></div>
          <div class="card"><h3>Total Ofertas</h3><p th:text="${totalOfertas}"></p></div>
          <div class="card"><h3>Total Usuarios</h3><p th:text="${totalUsuarios}"></p></div>
        </div>
      </div>
    </div>
  </main>
</body></html>
