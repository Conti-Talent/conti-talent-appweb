<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Admin Ofertas - Conti Talent</title>
  <link rel="stylesheet" th:href="@{/css/base.css}" />
</head>
<body>
  <a th:href="@{/admin}">Panel admin</a>
  <hr>
  <h1>Gestion de Ofertas</h1>

    <input type="text" id="titulo" required />

  <hr>
  <h2>Lista de ofertas</h2>
  <div id="lista-ofertas"><p>Cargando...</p></div>
  <script th:src="@{/js/page-admin-ofertas.js}"></script>
</body>
</html>
