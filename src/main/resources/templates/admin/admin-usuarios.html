<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios · Conti Talent Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <link rel="stylesheet" th:href="@{/css/pages.css}" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" th:href="@{/}">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span> · Admin</span>
      </a>
      <nav class="primary-nav">
        <a th:href="@{/}">Ir al sitio</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section__label">General</div>
        <a class="sidebar-link" th:href="@{/admin}"><span>📊</span> Dashboard</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section__label">Reclutamiento</div>
        <a class="sidebar-link" th:href="@{/admin/areas}"><span>🗂️</span> Áreas</a>
        <a class="sidebar-link" th:href="@{/admin/ofertas}"><span>💼</span> Ofertas</a>
        <a class="sidebar-link" th:href="@{/admin/preguntas}"><span>❓</span> Preguntas</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section__label">Evaluación</div>
        <a class="sidebar-link" th:href="@{/admin/postulantes}"><span>👥</span> Postulantes</a>
        <a class="sidebar-link" th:href="@{/admin/metricas}"><span>📈</span> Métricas / Ranking</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section__label">Sistema</div>
        <a class="sidebar-link is-active" th:href="@{/admin/usuarios}"><span>🔐</span> Usuarios</a>
      </div>
    </aside>

    <main class="app-main">
      <header class="page-header anim-fade-up">
        <div>
          <h1 class="page-header__title">Usuarios</h1>
          <p class="page-header__sub">Cuentas con acceso al sistema (postulantes y administradores).</p>
        </div>
        <button class="btn btn--primary" id="btn-nuevo-usuario">+ Nuevo usuario</button>
      </header>

      <section class="filters-bar">
        <div class="searchbar">
          <input class="input" id="search-usuario" type="search" placeholder="Buscar por nombre o correo..." />
        </div>
        <select class="select" id="filter-rol">
          <option value="">Todos los roles</option>
          <option value="postulante">Postulantes</option>
          <option value="admin">Administradores</option>
        </select>
      </section>

      <section class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Creado</th>
              <th class="text-right">Acciones</th>
            </tr>
          </thead>
          <tbody id="usuarios-tbody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script th:src="@{/js/storage.js}"></script>
  <script th:src="@{/js/seed.js}"></script>
  <script th:src="@{/js/ui.js}"></script>
  <script th:src="@{/js/validators.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
  <script th:src="@{/js/usuarios.js}"></script>
  <script th:src="@{/js/main.js}"></script>
  <script th:src="@{/js/page-admin-usuarios.js}"></script>
</body>
</html>
