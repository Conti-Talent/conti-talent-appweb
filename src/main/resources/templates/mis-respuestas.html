<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis respuestas · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <link rel="stylesheet" th:href="@{/css/pages.css}" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" th:href="@{/}">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a th:href="@{/mi-estado}">Mi estado</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container page-shell--narrow">
    <a th:href="@{/mi-estado}" class="btn btn--ghost btn--sm detalle-back-btn">← Volver a mi estado</a>

    <header class="anim-fade-up mb-5">
      <span class="badge" id="respuestas-area">—</span>
      <h1 id="respuestas-title" class="mt-2">—</h1>
      <div class="flex gap-3 items-center mt-2">
        <span id="respuestas-estado"></span>
        <span class="soft" id="respuestas-fecha"></span>
      </div>
    </header>

    <section class="kpi-grid mb-6" id="respuestas-summary"></section>

    <section>
      <h2 class="mb-3">Tus respuestas</h2>
      <p class="muted mb-5">Estas son las preguntas del cuestionario y la opción que marcaste durante la evaluación. Esta vista es de solo lectura.</p>
      <div id="respuestas-list"></div>
    </section>

    <footer class="form-actions mt-6">
      <a th:href="@{/mi-estado}" class="btn btn--primary">Volver a mi estado</a>
    </footer>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Universidad Continental · Conti Talent</span>
    </div>
  </footer>

  <script th:src="@{/js/storage.js}"></script>
  <script th:src="@{/js/seed.js}"></script>
  <script th:src="@{/js/ui.js}"></script>
  <script th:src="@{/js/validators.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
  <script th:src="@{/js/areas.js}"></script>
  <script th:src="@{/js/ofertas.js}"></script>
  <script th:src="@{/js/postulantes.js}"></script>
  <script th:src="@{/js/evaluacion.js}"></script>
  <script th:src="@{/js/main.js}"></script>
  <script th:src="@{/js/page-mis-respuestas.js}"></script>
</body>
</html>
