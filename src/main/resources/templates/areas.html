<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Areas - Conti Talent</title><link rel="stylesheet" th:href="@{/css/base.css}"/></head>
<body>
  <header class="site-header"><div class="container">
    <a th:href="@{/}" class="brand">ContiTalent</a>
    <nav class="primary-nav">
      <a th:href="@{/areas}">Areas</a><a th:href="@{/ofertas}">Ofertas</a>
      <a th:href="@{/contacto}">Contacto</a>
    </nav>
  </div></header>
  <main class="container">
    <h1 class="section-title">Areas</h1>
    <div class="grid grid--3">
      <div class="card" th:each="area : ${areas}">
        <h3 th:text="${area.nombre}"></h3>
        <p th:text="${area.descripcion}"></p>
      </div>
    </div>
  </main>
  <footer class="site-footer"><p>© 2026 Universidad Continental · Conti Talent</p></footer>
</body></html>
