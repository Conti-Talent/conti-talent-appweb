<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mi estado - Conti Talent</title><link rel="stylesheet" th:href="@{/css/base.css}"/></head>
<body>
  <header class="site-header"><div class="container">
    <a th:href="@{/}" class="brand">ContiTalent</a>
    <nav class="primary-nav">
      <a th:href="@{/ofertas}">Ofertas</a>
      <a th:href="@{/logout}">Cerrar sesion</a>
    </nav>
  </div></header>
  <main class="container">
    <h1>Mi estado</h1>
    <div class="card" th:if="${usuario != null}">
      <h3 th:text="${usuario.nombre + ' ' + usuario.apellido}"></h3>
      <p th:text="${usuario.email}"></p>
      <p>Rol: <strong th:text="${usuario.rol}"></strong></p>
    </div>
    <p th:if="${usuario == null}">No has iniciado sesion. <a th:href="@{/login}">Inicia sesion</a></p>
  </main>
  <footer class="site-footer"><p>© 2026 Universidad Continental · Conti Talent</p></footer>
</body></html>
