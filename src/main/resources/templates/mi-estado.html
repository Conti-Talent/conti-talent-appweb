<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi estado · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/base.css}" href="/css/base.css" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" href="/css/layout.css" />
  <link rel="stylesheet" th:href="@{/css/components.css}" href="/css/components.css" />
  <link rel="stylesheet" th:href="@{/css/pages.css}" href="/css/pages.css" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" href="/css/animations.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" th:href="@{/}" href="/">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a th:href="@{/ofertas}" href="/ofertas">Ver ofertas</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container page-shell">
    <header class="page-header anim-fade-up">
      <div>
        <h1 class="page-header__title">Mi estado</h1>
        <p class="page-header__sub">Sigue el avance de tus postulaciones en tiempo real.</p>
      </div>
      <a th:href="@{/ofertas}" href="/ofertas" class="btn btn--ghost">Postular a otra oferta</a>
    </header>
    <section id="estado-list" class="estado-list"></section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Universidad Continental · Conti Talent</span>
    </div>
  </footer>

  <script th:src="@{/js/storage-api.js?v=rest3}" src="/js/storage-api.js?v=rest3"></script>
  <script th:src="@{/js/ui.js?v=rest3}" src="/js/ui.js?v=rest3"></script>
  <script th:src="@{/js/validators.js?v=rest3}" src="/js/validators.js?v=rest3"></script>
  <script th:src="@{/js/auth.js?v=rest3}" src="/js/auth.js?v=rest3"></script>
  <script th:src="@{/js/areas.js?v=rest3}" src="/js/areas.js?v=rest3"></script>
  <script th:src="@{/js/ofertas.js?v=rest3}" src="/js/ofertas.js?v=rest3"></script>
  <script th:src="@{/js/postulantes.js?v=rest3}" src="/js/postulantes.js?v=rest3"></script>
  <script th:src="@{/js/main.js?v=rest3}" src="/js/main.js?v=rest3"></script>
  <script th:src="@{/js/page-mi-estado.js?v=rest3}" src="/js/page-mi-estado.js?v=rest3"></script>
</body>
</html>
