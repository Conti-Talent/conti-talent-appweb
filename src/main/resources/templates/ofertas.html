<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ofertas · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <link rel="stylesheet" th:href="@{/css/pages.css}" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" th:href="@{/}">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a th:href="@{/}"           data-nav="/">Inicio</a>
        <a th:href="@{/areas}"      data-nav="/areas">Áreas</a>
        <a th:href="@{/ofertas}"    data-nav="/ofertas" class="is-active">Ofertas</a>
        <a th:href="@{/publicidad}" data-nav="/publicidad">Publicidad</a>
        <a th:href="@{/contacto}"   data-nav="/contacto">Contacto</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container page-shell">
    <header class="page-header anim-fade-up">
      <div>
        <h1 class="page-header__title">Ofertas de la Universidad Continental</h1>
        <p class="page-header__sub">Filtra por tipo (prácticas o trabajo), área, modalidad o palabra clave.</p>
      </div>
    </header>

    <section class="filters-bar" aria-label="Filtros">
      <div class="searchbar">
        <input class="input" id="filter-search" type="search" placeholder="Buscar oferta..." />
      </div>
      <select class="select" id="filter-tipo" aria-label="Tipo de oferta">
        <option value="">Todos los tipos</option>
      </select>
      <select class="select" id="filter-area" aria-label="Área">
        <option value="">Todas las áreas</option>
      </select>
      <select class="select" id="filter-modalidad" aria-label="Modalidad">
        <option value="">Todas las modalidades</option>
        <option value="Presencial">Presencial</option>
        <option value="Remoto">Remoto</option>
        <option value="Híbrido">Híbrido</option>
      </select>
    </section>

    <section class="ofertas-list" id="ofertas-list" aria-label="Listado de ofertas"></section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Universidad Continental · Conti Talent</span>
      <span>Huancayo · Junín · Perú</span>
    </div>
  </footer>

  <script th:src="@{/js/storage.js}"></script>
  <script th:src="@{/js/seed.js}"></script>
  <script th:src="@{/js/ui.js}"></script>
  <script th:src="@{/js/validators.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
  <script th:src="@{/js/areas.js}"></script>
  <script th:src="@{/js/ofertas.js}"></script>
  <script th:src="@{/js/main.js}"></script>
  <script th:src="@{/js/page-ofertas.js}"></script>
</body>
</html>
